<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Xisheng Yu - Academic CV</title>

<style>
/* ===== 全局 ===== */
body {
    margin: 0;
    font-family: "Helvetica Neue", Arial, sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
}

/* ===== 左侧栏 ===== */
.sidebar {
    width: 28%;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 30px 20px;
}

/* 导航栏 */
.nav {
    margin-top: 20px;
}

.nav a {
    display: block;
    color: white;
    text-decoration: none;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    transition: all 0.3s ease;
}

/* hover 动效 */
.nav a:hover {
    background: rgba(255,255,255,0.2);
    transform: translateX(8px);
}

/* 标题 */
.title {
    font-size: 26px;
    font-weight: bold;
    margin-bottom: 10px;
}

/* 左下角信息 */
.footer-info {
    font-size: 14px;
    line-height: 1.6;
    border-top: 1px solid rgba(255,255,255,0.3);
    padding-top: 15px;
}

/* ===== 右侧内容 ===== */
.content {
    width: 72%;
    height: 100%;
    overflow: hidden;
}

/* iframe */
.content iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* ===== 滚动动画（微动感） ===== */
.sidebar {
    animation: fadeIn 1.2s ease;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateX(-20px);}
    to {opacity: 1; transform: translateX(0);}
}
</style>

</head>

<body>

<!-- 左侧 -->
<div class="sidebar">

    <div>
        <div class="title">Xisheng Yu</div>

        <div class="nav">
            <a href="#section1">Education</a>
            <a href="#section2">Research</a>
            <a href="#section3">Publications</a>
            <a href="#section4">Teaching</a>
            <a href="#section5">Projects</a>
            <a href="#section6">Awards</a>
        </div>
    </div>

    <!-- 左下角（你要求移动的内容） -->
    <div class="footer-info">
        <strong>Self-Evaluation:</strong><br>
        纯粹, 努力, 坦荡<br><br>

        <strong>Attitude:</strong><br>
        真做学问, 做真学问<br><br>

        <strong>My Motto:</strong><br>
        规格严格, 功夫到家<br><br>

        <strong>E-mail:</strong><br>
        yuxisheng@swufe.edu.cn
    </div>

</div>

<!-- 右侧 -->
<div class="content">
    <!-- 关键：嵌入原网页，不做任何修改 -->
    <iframe src="index.md"></iframe>
</div>

</body>
</html>
